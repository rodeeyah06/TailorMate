name: Build iOS IPA

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build IPA
        run: |
          flutter build ipa \
            --no-codesign \
            --dart-define=GEMINI_KEY=${{ secrets.GEMINI_KEY }}

      - name: List build output
        run: |
          find build/ios -name "*.ipa" 2>/dev/null || echo "No IPA found"
          find build/ios -name "*.app" 2>/dev/null || echo "No app found"
          ls -la build/ios/ || echo "No build folder"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TailorMate-IPA
          path: build/ios/ipa/
          if-no-files-found: warn