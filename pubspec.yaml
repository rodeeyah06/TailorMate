name: tailormate
description: "A tailor measurement app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  provider: ^6.1.2
  share_plus: ^9.0.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3
  pdf: ^3.10.8
  printing: ^5.12.0
  http: ^1.2.1
  google_generative_ai: ^0.4.3
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  flutter_launcher_icons: ^0.14.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  google_sign_in: ^6.2.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.jpg"
  min_sdk_android: 21
